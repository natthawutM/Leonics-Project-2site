<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generator — Tetabuan MOC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-main:#f5f5f0;--bg-card:#ffffff;--bg-panel:#fafaf7;
  --border-default:#e8e6df;--text-primary:#1a1a1a;--text-secondary:#888;--text-tertiary:#aaa;
  --success:#22c55e;--orange:#ea580c;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;
  --font-sans:'DM Sans',system-ui,sans-serif;--font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;max-width:100vw;overflow-x:hidden}
body{font-family:var(--font-sans);background:var(--bg-main);color:var(--text-primary);font-size:13px;line-height:1.5;padding:16px;min-height:100vh}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1}

.page{max-width:1400px;margin:0 auto}
.grid-2{display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:14px}

/* Summary card */
.summary-card{
  background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);
  padding:16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.sum-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sum-icon{
  width:46px;height:46px;border-radius:10px;
  background:rgba(234,88,12,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--orange);
}
.sum-info .lbl{font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px}
.sum-info .title{font-size:14px;font-weight:600;margin-top:2px}
.sum-info .sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.sum-right{display:flex;gap:10px;flex-wrap:wrap}
.sum-metric{background:var(--bg-panel);border-radius:var(--radius-sm);padding:8px 14px;min-width:110px}
.sum-metric .lbl{font-size:10px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px}
.sum-metric .val{font-family:var(--font-mono);font-size:18px;font-weight:700;margin-top:2px;color:var(--orange)}
.sum-metric .val .u{font-size:11px;color:var(--text-secondary);margin-left:3px;font-weight:500}

.card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:16px;min-width:0;transition:border-color .2s}
.card.running{border-color:#fed7aa}
.card-title{font-size:12px;font-weight:600;color:var(--text-primary);text-transform:uppercase;letter-spacing:.3px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title .left{display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500}
.pill-ok{background:rgba(34,197,94,.10);color:var(--success)}
.pill-run{background:rgba(234,88,12,.10);color:var(--orange)}
.pill-idle{background:var(--bg-panel);color:var(--text-secondary)}
.pill .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-on{background:var(--orange);animation:pulse 1.6s ease-in-out infinite}
.dot-off{background:var(--text-tertiary)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Hero AC value */
.hero{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--bg-panel);border-radius:var(--radius-md);
  padding:12px 14px;margin-bottom:12px;
}
.hero .lbl{font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px}
.hero .sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.hero .val{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--orange)}
.hero .val .u{font-size:12px;color:var(--text-secondary);margin-left:3px;font-weight:500}

.section-label{font-size:11px;font-weight:600;color:var(--text-primary);text-transform:uppercase;letter-spacing:.3px;padding:10px 0 6px;border-bottom:1px solid var(--border-default);margin:6px 0 8px}

.kpi-row{display:grid;grid-template-columns:repeat(4, minmax(0, 1fr));gap:6px;margin-bottom:8px}
.kpi-row.cols2{grid-template-columns:repeat(2, minmax(0, 1fr))}
.kpi-row.cols3{grid-template-columns:repeat(3, minmax(0, 1fr))}
.kpi-box{background:var(--bg-panel);border-radius:var(--radius-sm);padding:8px 10px;min-width:0;overflow:hidden}
.kpi-box .lbl{font-size:9px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-box .val{font-family:var(--font-mono);font-size:14px;font-weight:600;margin-top:2px;white-space:nowrap}
.kpi-box .val .u{font-size:10px;color:var(--text-secondary);margin-left:2px;font-weight:500}

/* 3-phase tables */
.phase-chip{display:inline-block;width:6px;height:6px;border-radius:2px;margin-right:5px;vertical-align:middle}
.phase-table{width:100%;border-collapse:collapse}
.phase-table th{font-size:9px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px;text-align:right;padding:5px 4px;border-bottom:1px solid var(--border-default)}
.phase-table th:first-child{text-align:left}
.phase-table td{font-family:var(--font-mono);font-size:12px;padding:6px 4px;text-align:right;border-bottom:1px solid var(--border-default)}
.phase-table td:first-child{font-family:var(--font-sans);text-align:left;font-weight:500;font-size:11px}
.phase-table tr:last-child td{border-bottom:none}

.energy-row{display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:8px;margin-top:6px}
.energy-box{background:var(--bg-panel);border-radius:var(--radius-sm);padding:9px 11px;display:flex;justify-content:space-between;align-items:center;min-width:0}
.energy-box .lbl{font-size:10px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.energy-box .val{font-family:var(--font-mono);font-size:13px;font-weight:600;white-space:nowrap}
.energy-box .val .u{font-size:10px;color:var(--text-secondary);margin-left:2px}

.stamp{font-size:11px;color:var(--text-tertiary);display:flex;justify-content:space-between;padding:4px;margin-top:4px}
.stamp .live{display:inline-flex;align-items:center;gap:6px;color:var(--success);font-weight:500}
.stamp .live::before{content:"";width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 1.6s ease-in-out infinite}

@media(max-width:1024px){
  .grid-2{grid-template-columns:1fr}
}
@media(max-width:600px){
  body{padding:10px}
  .card{padding:12px}
  .summary-card{padding:12px}
  .sum-metric{min-width:90px;padding:6px 10px}
  .sum-metric .val{font-size:15px}
  .hero{padding:10px 12px}
  .hero .val{font-size:18px}
  .kpi-row{grid-template-columns:repeat(2, minmax(0, 1fr))}
  .energy-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

  <!-- Summary card -->
  <div class="summary-card">
    <div class="sum-left">
      <div class="sum-icon">&#9881;</div>
      <div class="sum-info">
        <div class="lbl">Diesel Generators</div>
        <div class="title">Gen 1 + Gen 2</div>
        <div class="sub" id="sum-active">— units running</div>
      </div>
    </div>
    <div class="sum-right">
      <div class="sum-metric"><div class="lbl">Total power</div><div class="val mono"><span id="sum-power">—</span><span class="u">kW</span></div></div>
      <div class="sum-metric"><div class="lbl">Today energy</div><div class="val mono"><span id="sum-today-kwh">—</span><span class="u">kWh</span></div></div>
      <div class="sum-metric"><div class="lbl">Today run</div><div class="val mono"><span id="sum-today-run">—</span><span class="u">h</span></div></div>
    </div>
  </div>

  <!-- 2 Gen cards -->
  <div class="grid-2" id="gen-grid">
    <!-- rendered by JS -->
  </div>

  <div class="stamp">
    <span class="live">Live · refreshes every 2s</span>
    <span>Last update: <span id="last-update" class="mono" style="color:#1a1a1a">—</span></span>
  </div>
</div>

<script>
const XML_URL = 'Xml/Main_test.xml';   // production. Test: 'Xml/simulate.php'
const ENERGYLOG_URL = 'Xml/Energylog.xml';
const POLL_MS = 2000;
const $ = id => document.getElementById(id);

function num(xml, tag, d=2){
  const el = xml.querySelector(tag); if(!el) return null;
  const t = el.textContent.trim();
  if(t==='' || t==='Err' || t==='err' || isNaN(parseFloat(t))) return null;
  return Number(parseFloat(t).toFixed(d));
}
function str(xml, tag){
  const el = xml.querySelector(tag);
  return el ? el.textContent.trim() : '';
}
function isGenRunning(engine, powerKw){
  const s = (engine || '').trim().toLowerCase();
  if(s === 'running') return true;
  if(s === 'stop' || s === 'stopped') return false;
  return (powerKw ?? 0) > 0.5;
}
function fmt(v, d=2){ return v===null||v===undefined ? '—' : Number(v).toFixed(d); }

function buildGenCard(xml, energyXml, n){
  const p = 'Gen' + n + '_';
  const v = (tag, d=2) => fmt(num(xml, p+tag, d), d);

  const engine = str(xml, p+'Engine');           // "Running" / "Stop"
  const totP = num(xml, p+'Total_Power_kW', 2) ?? 0;
  const running = isGenRunning(engine, totP);
  const todayKwh = num(energyXml, p+'Today_kWh', 2) ?? 0;
  const todayRun = num(energyXml, p+'Today_Run_hour_h', 2) ?? 0;

  const statusClass = running ? 'pill-run' : 'pill-idle';
  const statusDot   = running ? 'dot-on'   : 'dot-off';
  const statusText  = running ? 'Running'  : ((engine && engine.toLowerCase() !== 'running') ? engine : 'Stop');

  return `<div class="card${running ? ' running' : ''}">
    <div class="card-title">
      <span class="left">
        <span class="dot" style="background:${running?'#ea580c':'#aaa'}"></span>
        Gen ${n}
        <span style="color:#888;font-weight:500;letter-spacing:0;text-transform:none;font-size:11px">· Diesel Generator</span>
      </span>
      <span class="pill ${statusClass}"><span class="dot ${statusDot}"></span>${statusText}</span>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div>
        <div class="lbl">Output power</div>
        <div class="sub">PF ${v('Power_factor',2)} · Reactive ${v('Total_ReactivePower_kVA',2)} kVA</div>
      </div>
      <div class="val mono">${fmt(totP, 2)}<span class="u">kW</span></div>
    </div>

    <!-- 3-phase output -->
    <div class="section-label">3-phase output</div>
    <table class="phase-table">
      <thead><tr><th></th><th>V<sub>L-N</sub></th><th>V<sub>L-L</sub></th><th>I (A)</th></tr></thead>
      <tbody>
        <tr><td><span class="phase-chip" style="background:#ef4444"></span>L1</td>
          <td>${v('V1n',1)}</td><td>${v('VoltageL1_L2',1)}</td><td>${v('I1',1)}</td></tr>
        <tr><td><span class="phase-chip" style="background:#f59e0b"></span>L2</td>
          <td>${v('V2n',1)}</td><td>${v('VoltageL2_L3',1)}</td><td>${v('I2',1)}</td></tr>
        <tr><td><span class="phase-chip" style="background:#3b82f6"></span>L3</td>
          <td>${v('V3n',1)}</td><td>${v('VoltageL3_L1',1)}</td><td>${v('I3',1)}</td></tr>
      </tbody>
    </table>

    <!-- Engine analog inputs (oil pressure, fuel level, etc) -->
    <div class="section-label">Analog inputs</div>
    <div class="kpi-row">
      <div class="kpi-box"><div class="lbl">Analog 1</div><div class="val mono">${v('Analog1_percent',1)}<span class="u">%</span></div></div>
      <div class="kpi-box"><div class="lbl">Analog 2</div><div class="val mono">${v('Analog2_percent',1)}<span class="u">%</span></div></div>
      <div class="kpi-box"><div class="lbl">Analog 3</div><div class="val mono">${v('Analog3_percent',1)}<span class="u">%</span></div></div>
      <div class="kpi-box"><div class="lbl">Analog 4</div><div class="val mono">${v('Analog4_percent',1)}<span class="u">%</span></div></div>
    </div>

    <!-- Lifetime + today -->
    <div class="section-label">Run hours &amp; energy</div>
    <div class="energy-row">
      <div class="energy-box"><span class="lbl">Lifetime energy</span><span class="val mono">${v('Real_Energy_MWh',2)}<span class="u">MWh</span></span></div>
      <div class="energy-box"><span class="lbl">Lifetime run</span><span class="val mono">${v('Run_hour_h',1)}<span class="u">h</span></span></div>
      <div class="energy-box"><span class="lbl">Today energy</span><span class="val mono">${fmt(todayKwh,2)}<span class="u">kWh</span></span></div>
      <div class="energy-box"><span class="lbl">Today run</span><span class="val mono">${fmt(todayRun,2)}<span class="u">h</span></span></div>
    </div>
  </div>`;
}

async function fetchAndRender(){
  try{
    const [mainRes, energyRes] = await Promise.all([
      fetch(XML_URL + '?_=' + Date.now(), {cache:'no-store'}),
      fetch(ENERGYLOG_URL + '?_=' + Date.now(), {cache:'no-store'})
    ]);
    if(!mainRes.ok) throw new Error('Main XML HTTP ' + mainRes.status);
    if(!energyRes.ok) throw new Error('Energylog XML HTTP ' + energyRes.status);
    const [mainText, energyText] = await Promise.all([mainRes.text(), energyRes.text()]);
    const xml = new DOMParser().parseFromString(mainText, 'text/xml');
    const energyXml = new DOMParser().parseFromString(energyText, 'text/xml');

    // Render 2 Gen cards
    $('gen-grid').innerHTML = buildGenCard(xml, energyXml, 1) + buildGenCard(xml, energyXml, 2);

    // Summary totals
    const p1 = num(xml, 'Gen1_Total_Power_kW', 2) ?? 0;
    const p2 = num(xml, 'Gen2_Total_Power_kW', 2) ?? 0;
    const today1 = num(energyXml, 'Gen1_Today_kWh', 2) ?? 0;
    const today2 = num(energyXml, 'Gen2_Today_kWh', 2) ?? 0;
    const run1 = num(energyXml, 'Gen1_Today_Run_hour_h', 2) ?? 0;
    const run2 = num(energyXml, 'Gen2_Today_Run_hour_h', 2) ?? 0;
    const e1 = isGenRunning(str(xml, 'Gen1_Engine'), p1);
    const e2 = isGenRunning(str(xml, 'Gen2_Engine'), p2);
    const activeCount = (e1?1:0) + (e2?1:0);

    $('sum-power').textContent = fmt(p1+p2, 2);
    $('sum-today-kwh').textContent = fmt(today1+today2, 2);
    $('sum-today-run').textContent = fmt(run1+run2, 2);
    $('sum-active').textContent = activeCount + ' / 2 units running';

    const now = new Date(), pad = n => String(n).padStart(2,'0');
    $('last-update').textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }catch(e){
    console.error('Gen fetch error:', e);
    const lu = $('last-update');
    if(lu){ lu.textContent = 'error: '+e.message; lu.style.color='#ef4444'; }
  }
}
fetchAndRender();
setInterval(fetchAndRender, POLL_MS);
</script>
</body>
</html>
