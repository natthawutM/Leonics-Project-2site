<!doctype html>
<html lang="en">
<head>

  <script>
    if (window.history && window.history.replaceState) {
      var basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
      if (!document.querySelector('base')) {
        var base = document.createElement('base');
        base.href = basePath;
        document.head.appendChild(base);
      }
      window.history.replaceState({}, document.title, '/#');
    }
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Energy Reports Test — Tetabuan MOC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      height: 100%;
      background: #f5f5f0;
      overflow: hidden;
    }
    .container {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0;
    }
    iframe {
      width: 100%;
      border: 0;
      display: block;
      background: #f5f5f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe src="graph/monthly_test.html" style="height:560px" scrolling="no"></iframe>
    <iframe src="graph/yearly_test.html" style="height:560px" scrolling="no"></iframe>
  </div>
</body>
</html>
