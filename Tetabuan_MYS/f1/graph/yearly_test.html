<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yearly Energy - Tetabuan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      font-size: 13px;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .card {
      background: #fff;
      border: 1px solid #e8e6df;
      border-radius: 12px;
      padding: 16px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ea580c;
    }
    .card-title b {
      color: #1a1a1a;
      font-weight: 600;
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0;
    }
    .sim-tag {
      font-size: 10px;
      font-weight: 600;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 2px 7px;
      letter-spacing: .3px;
    }
    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .date-row select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 12px;
      border: 1px solid #e8e6df;
      border-radius: 8px;
      background: #fafaf7;
      color: #1a1a1a;
      outline: none;
    }
    .date-row select:focus { border-color: #999; }
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .kpi-box {
      background: #fafaf7;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .kpi-box .lbl {
      font-size: 10px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .kpi-box .val {
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 600;
      margin-top: 2px;
    }
    .kpi-box .val .u {
      font-size: 10px;
      color: #888;
      margin-left: 2px;
    }
    #container {
      width: 100%;
      height: 340px;
    }
    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      body { padding: 10px; }
      .card { padding: 12px; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      #container { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-head">
        <div class="card-title">
          <span class="dot"></span>
          Yearly Energy Report - <b id="lbl">-</b>
          <span class="sim-tag">SIMULATED</span>
        </div>
        <div class="date-row">
          <select id="y"></select>
        </div>
      </div>

      <div class="kpi-row">
        <div class="kpi-box"><div class="lbl">PV</div><div class="val" style="color:#f59e0b"><span id="t-pv">-</span><span class="u">kWh</span></div></div>
        <div class="kpi-box"><div class="lbl">Gen</div><div class="val" style="color:#3b82f6"><span id="t-gen">-</span><span class="u">kWh</span></div></div>
        <div class="kpi-box"><div class="lbl">Load</div><div class="val" style="color:#1a1a1a"><span id="t-load">-</span><span class="u">kWh</span></div></div>
        <div class="kpi-box"><div class="lbl">Irradiation</div><div class="val" style="color:#ef4444"><span id="t-irr">-</span><span class="u">kWh/m²</span></div></div>
        <div class="kpi-box"><div class="lbl">Renewable %</div><div class="val" style="color:#10b981"><span id="t-ratio">-</span><span class="u">%</span></div></div>
      </div>

      <div id="container"></div>
    </div>
  </div>

  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <script>
    var MN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    function rnd(seed) {
      var x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }
    function daysInMonth(y, m) {
      return new Date(y, m, 0).getDate();
    }
    function fmt1(n) {
      return (Math.round(n * 10) / 10).toLocaleString();
    }
    function monthTotals(y, m) {
      var nd = daysInMonth(y, m);
      var tp = 0;
      var tg = 0;
      var tl = 0;
      var ti = 0;
      var d;

      for (d = 1; d <= nd; d++) {
        var s = y * 372 + m * 31 + d;
        var weather = 0.7 + 0.55 * rnd(s);
        var pvDay = 175 * weather + (rnd(s + 1) * 30 - 15);
        var loadDay = 250 + 20 * Math.sin(d * 0.4) + (rnd(s + 3) * 30 - 15);
        var genDay = Math.max(0, loadDay - pvDay) * (0.55 + 0.25 * rnd(s + 4));
        var irrDay = 4.0 * weather + (rnd(s + 6) * 1.2 - 0.6);

        tp += pvDay;
        tg += genDay;
        tl += loadDay;
        ti += irrDay;
      }

      return [
        Math.round(tp * 10) / 10,
        Math.round(tg * 10) / 10,
        Math.round(tl * 10) / 10,
        Math.round(ti * 100) / 100
      ];
    }
    function build(y) {
      var pv = [];
      var gen = [];
      var load = [];
      var irr = [];
      var tp = 0;
      var tg = 0;
      var tl = 0;
      var ti = 0;
      var m;

      for (m = 1; m <= 12; m++) {
        var totals = monthTotals(y, m);
        pv.push(totals[0]);
        gen.push(totals[1]);
        load.push(totals[2]);
        irr.push(totals[3]);
        tp += totals[0];
        tg += totals[1];
        tl += totals[2];
        ti += totals[3];
      }

      return {
        pv: pv,
        gen: gen,
        load: load,
        irr: irr,
        tp: tp,
        tg: tg,
        tl: tl,
        ti: ti
      };
    }

    var chart = null;
    function render() {
      var y = parseInt(document.getElementById('y').value, 10);
      var data = build(y);
      var supply = data.tp + data.tg;
      var ratio = supply > 0 ? Math.round(data.tp / supply * 100) : 0;

      document.getElementById('lbl').textContent = String(y);
      document.getElementById('t-pv').textContent = fmt1(data.tp);
      document.getElementById('t-gen').textContent = fmt1(data.tg);
      document.getElementById('t-load').textContent = fmt1(data.tl);
      document.getElementById('t-irr').textContent = fmt1(data.ti);
      document.getElementById('t-ratio').textContent = ratio;

      if (chart) chart.destroy();
      chart = Highcharts.chart('container', {
        chart: {
          backgroundColor: 'transparent',
          style: { fontFamily: "'DM Sans', sans-serif" },
          zoomType: 'xy'
        },
        credits: { enabled: false },
        title: { text: null },
        xAxis: {
          categories: MN,
          title: { text: 'Month', style: { color: '#888' } },
          gridLineColor: '#e8e6df',
          lineColor: '#e8e6df',
          tickColor: '#e8e6df',
          labels: { style: { color: '#aaa', fontFamily: "'DM Mono', monospace" } }
        },
        yAxis: [
          {
            min: 0,
            startOnTick: true,
            endOnTick: false,
            gridLineColor: '#e8e6df',
            title: { text: 'kWh', style: { color: '#888' } },
            labels: { style: { color: '#aaa', fontFamily: "'DM Mono', monospace" } }
          },
          {
            min: 0,
            max: 150,
            tickInterval: 50,
            startOnTick: false,
            endOnTick: false,
            opposite: true,
            gridLineColor: 'transparent',
            title: { text: 'kWh/m²', style: { color: '#888' } },
            labels: { style: { color: '#aaa', fontFamily: "'DM Mono', monospace" } }
          }
        ],
        legend: {
          layout: 'horizontal',
          align: 'center',
          itemStyle: { fontFamily: "'DM Sans', sans-serif", fontSize: '12px', color: '#555' }
        },
        tooltip: {
          shared: true,
          backgroundColor: '#fff',
          borderColor: '#e8e6df',
          borderRadius: 8,
          borderWidth: 1,
          shadow: false,
          style: { fontFamily: "'DM Mono', monospace", fontSize: '12px', color: '#1a1a1a' }
        },
        plotOptions: {
          column: {
            pointPadding: 0.04,
            borderWidth: 0,
            borderRadius: 3
          }
        },
        series: [
          { type: 'column', color: '#f59e0b', name: 'PV (kWh)', data: data.pv },
          { type: 'column', color: '#3b82f6', name: 'Gen (kWh)', data: data.gen },
          { type: 'column', color: '#1a1a1a', name: 'Load (kWh)', data: data.load },
          { type: 'spline', color: '#ef4444', yAxis: 1, name: 'Irradiation (kWh/m²)', data: data.irr, lineWidth: 1.6, dashStyle: 'Dot', marker: { enabled: false } }
        ]
      });
    }

    (function () {
      var cy = new Date().getFullYear();
      var ySel = document.getElementById('y');
      var y;

      for (y = 2026; y <= cy; y++) {
        ySel.insertAdjacentHTML('beforeend', '<option value="' + y + '"' + (y === cy ? ' selected' : '') + '>' + y + '</option>');
      }
      if (!ySel.options.length) {
        ySel.insertAdjacentHTML('beforeend', '<option value="' + cy + '" selected>' + cy + '</option>');
      }
      ySel.addEventListener('change', render);
      render();
    })();
  </script>
</body>
</html>
