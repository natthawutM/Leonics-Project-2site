<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Graph — Department of Water Resource</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      font-size: 13px
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto
    }

    .card {
      background: #fff;
      border: 1px solid #e8e6df;
      border-radius: 12px;
      padding: 16px
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .card-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6
    }

    .card-title b {
      color: #1a1a1a;
      font-weight: 600;
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0
    }

    .sim-tag {
      font-size: 10px;
      font-weight: 600;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 2px 7px;
      letter-spacing: .3px
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .date-row input[type=date] {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 12px;
      border: 1px solid #e8e6df;
      border-radius: 8px;
      background: #fafaf7;
      color: #1a1a1a;
      outline: none
    }

    .date-row input[type=date]:focus {
      border-color: #999
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 16px
    }

    .kpi-box {
      background: #fafaf7;
      border-radius: 6px;
      padding: 10px 12px
    }

    .kpi-box .lbl {
      font-size: 10px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .3px
    }

    .kpi-box .val {
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 600;
      margin-top: 2px
    }

    .kpi-box .val .u {
      font-size: 10px;
      color: #888;
      margin-left: 2px
    }

    #container {
      width: 100%;
      height: 430px
    }

    .note {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .note .lg {
      display: inline-flex;
      align-items: center;
      gap: 6px
    }

    .note .sw {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      display: inline-block
    }

    .note .ax {
      font-weight: 700;
      font-size: 12px;
      margin-left: 2px
    }

    .note .ax-l {
      color: #888
    }

    .note .ax-r {
      color: #06b6d4
    }

    .axis-guide {
      font-size: 11px;
      color: #666;
      background: #fafaf7;
      border: 1px dashed #e8e6df;
      border-radius: 6px;
      padding: 6px 10px;
      margin: 6px 0 4px;
      display: inline-block
    }

    .axis-guide b {
      color: #1a1a1a;
      font-weight: 600
    }

    @media(max-width:700px) {
      .kpi-row {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    @media(max-width:600px) {
      body {
        padding: 10px
      }

      .card {
        padding: 12px
      }

      #container {
        height: 340px
      }
    }

    @media(max-width:480px) {
      .kpi-row {
        grid-template-columns: repeat(2, 1fr)
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="card-head">
        <div class="card-title"><span class="dot"></span>Power Graph — <b id="lbl">—</b> <span
            class="sim-tag">SIMULATED</span></div>
        <div class="date-row">
          <input type="date" id="dp" />
        </div>
      </div>

      <div class="kpi-row">

        <div class="kpi-box">
          <div class="lbl">Latest Batt V.</div>
          <div class="val" style="color:#ea580c"><span id="t-battv">—</span><span class="u">V</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">PV (3d Total)</div>
          <div class="val" style="color:#f59e0b"><span id="t-pv">—</span><span class="u">kW</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">AC Input (3d Total)</div>
          <div class="val" style="color:#3b82f6"><span id="t-gen">—</span><span class="u">kW</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">Load (3d Total)</div>
          <div class="val" style="color:#1a1a1a"><span id="t-load">—</span><span class="u">kW</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">Wind</div>
          <div class="val" style="color:#06b6d4"><span id="t-wt">—</span><span class="u">kW</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">Latest Irradiance</div>
          <div class="val" style="color:#ef4444"><span id="t-irr">—</span><span class="u">W/m²</span></div>
        </div>
        <div class="kpi-box">
          <div class="lbl">Latest SOC</div>
          <div class="val" style="color:#8b5cf6"><span id="t-soc">—</span><span class="u">%</span></div>
        </div>

      </div>

      <div id="container"></div>
      <div class="axis-guide"><b>← Left axis</b>&nbsp;kW · SOC %&nbsp;&nbsp;|&nbsp;&nbsp;<b>Right axis →</b>&nbsp;Volt ·
        W/m²</div>
      <div class="note">drag to zoom · use the range bar to scroll 3 days · generated data (?sim=1)</div>
    </div>
  </div>

  <script src="https://code.highcharts.com/stock/highstock.js"></script>
  <script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
  <script>
    // ── deterministic-ish simulator: 3-day, 5-min resolution, time-of-day patterns ──
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function solarFactor(h) { if (h < 6 || h > 18) return 0; return Math.pow(Math.sin(Math.PI * (h - 6) / 12), 1.15); }
    // smooth pseudo-noise from a seed (stable per timestamp so chart doesn't jitter on redraw)
    function n1(seed) { var x = Math.sin(seed * 12.9898) * 43758.5453; return x - Math.floor(x); }

    function buildSeries(endDateStr) {
      var end = new Date(endDateStr + 'T00:00:00');
      var start = new Date(end); start.setDate(start.getDate() - 2);   // 3-day window: end-2 .. end
      var battV = [], pv = [], gen = [], ld = [], wt = [], irr = [], soc = [];
      var t = new Date(start);
      for (var k = 0; k < 3 * 288; k++) {                       // 3 days × 288 (5-min)
        var ts = Date.UTC(t.getFullYear(), t.getMonth(), t.getDate(), t.getHours(), t.getMinutes(), 0);
        var h = t.getHours() + t.getMinutes() / 60;
        var dseed = t.getDate() + t.getMonth() * 31;
        var sf = solarFactor(h) * (0.82 + 0.30 * n1(dseed));   // per-day weather variation
        var pvKW = sf * 40 + (sf > 0 ? (n1(k) * 2 - 1) : 0);
        var windKW = clamp(2.4 + 3.2 * Math.sin(h * 0.7 + 1 + dseed) + (n1(k * 1.7) * 2 - 1) * 1.4, 0, 11);
        var loadKW = 10 + 9 * clamp(Math.sin(Math.PI * (h - 7) / 13), 0, 1) + (n1(k * 2.3) * 2 - 1) * 2.0;
        var socV = clamp(56 + 22 * Math.sin(Math.PI * (h - 8.5) / 12), 33, 95);
        var battP = (pvKW + windKW) - loadKW;             // +surplus / -deficit
        var battKW = battP > 0.5 ? -clamp(battP * 0.55, 0, 28) : (battP < -0.5 ? clamp(-battP * 0.7, 0, 24) : 0);
        var gridKW = clamp(loadKW - pvKW - windKW + (battKW < 0 ? -battKW : 0) - (battKW > 0 ? battKW : 0), -25, 60);
        var bv = 380 + (socV - 60) * 0.35;
        var rad = Math.max(0, sf * 1000 + (sf > 0 ? (n1(k * 3.1) * 40 - 20) : 0));
        battV.push([ts, Math.round(bv * 10) / 10]);
        pv.push([ts, Math.round(pvKW * 100) / 100]);
        gen.push([ts, Math.round(gridKW * 100) / 100]);
        ld.push([ts, Math.round(loadKW * 100) / 100]);
        wt.push([ts, Math.round(windKW * 100) / 100]);
        irr.push([ts, Math.round(rad)]);
        soc.push([ts, Math.round(socV * 10) / 10]);
        t = new Date(t.getTime() + 5 * 60000);
      }
      return { battV: battV, pv: pv, gen: gen, ld: ld, wt: wt, irr: irr, soc: soc, start: start, end: end };
    }

    function fmtLbl(d) {
      var M = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return String(d.getDate()).padStart(2, '0') + '-' + M[d.getMonth()] + '-' + d.getFullYear();
    }

    var chart;
    function render(endDateStr) {
      var S = buildSeries(endDateStr);
      document.getElementById('lbl').textContent = fmtLbl(S.end);

      // Calculate sums for KPIs
      var tpv = 0, tgen = 0, tld = 0, twt = 0;
      for (var i = 0; i < S.pv.length; i++) {
        if (S.pv[i][1] > 0) tpv += S.pv[i][1] * (5 / 60);
        if (S.gen[i][1] > 0) tgen += S.gen[i][1] * (5 / 60);
        if (S.ld[i][1] > 0) tld += S.ld[i][1] * (5 / 60);
        if (S.wt[i][1] > 0) twt += S.wt[i][1] * (5 / 60);
      }

      // Get latest values
      var latestSoc = S.soc[S.soc.length - 1][1];
      var latestBatt = S.battV[S.battV.length - 1][1];
      var latestIrr = S.irr[S.irr.length - 1][1];

      var f1 = function (n) { return (Math.round(n * 10) / 10).toLocaleString(); };
      document.getElementById('t-pv').textContent = f1(tpv);
      document.getElementById('t-gen').textContent = f1(tgen);
      document.getElementById('t-load').textContent = f1(tld);
      document.getElementById('t-wt').textContent = f1(twt);
      document.getElementById('t-soc').textContent = f1(latestSoc);
      document.getElementById('t-battv').textContent = f1(latestBatt);
      document.getElementById('t-irr').textContent = f1(latestIrr);

      var opt = {
        chart: { renderTo: 'container', backgroundColor: 'transparent', style: { fontFamily: "'DM Sans',sans-serif" }, zoomType: 'x' },
        credits: { enabled: false },
        legend: { enabled: true, symbolWidth: 10, symbolHeight: 10, symbolRadius: 5, itemStyle: { fontFamily: "'DM Sans',sans-serif", fontSize: '12px', color: '#555' } },
        title: { text: null }, subtitle: { text: null },
        rangeSelector: {
          buttonTheme: {
            fill: '#fff', stroke: '#e8e6df', 'stroke-width': 1, r: 6,
            style: { color: '#888', fontWeight: '500' },
            states: { select: { fill: '#1a1a1a', style: { color: '#fff' } }, hover: { fill: '#f5f5f0' } }
          },
          inputEnabled: false, labelStyle: { color: '#888' },
          buttons: [{ type: 'day', count: 1, text: '1d' }, { type: 'day', count: 2, text: '2d' }, { type: 'all', text: '3d' }],
          selected: 2
        },
        navigator: {
          maskFill: 'rgba(59,130,246,0.08)', series: { color: '#888', lineColor: '#888' },
          xAxis: { gridLineColor: '#e8e6df' }, handles: { backgroundColor: '#fff', borderColor: '#999' }
        },
        scrollbar: {
          barBackgroundColor: '#ccc', barBorderWidth: 0, barBorderRadius: 4, buttonBackgroundColor: '#eee',
          buttonBorderWidth: 0, trackBackgroundColor: '#f0f0f0', trackBorderWidth: 0, rifleColor: '#999', height: 10
        },
        tooltip: {
          shared: true, backgroundColor: '#fff', borderColor: '#e8e6df', borderRadius: 8, borderWidth: 1,
          shadow: false, style: { fontFamily: "'DM Mono',monospace", fontSize: '12px', color: '#1a1a1a' }
        },
        yAxis: [
          { min: 0, max: 100, tickInterval: 25, startOnTick: false, endOnTick: false, gridLineColor: '#e8e6df', title: { text: null }, opposite: false, labels: { format: '{value}%', style: { color: '#aaa' } } },
          { min: -100, max: 100, tickInterval: 50, startOnTick: false, endOnTick: false, gridLineColor: '#e8e6df', title: { text: null }, opposite: false, labels: { format: '{value} kW', style: { color: '#aaa' } } },
          { min: 200, max: 450, tickInterval: 50, startOnTick: false, endOnTick: false, gridLineColor: 'transparent', title: { text: null }, opposite: true, labels: { format: '{value} V', style: { color: '#aaa' } } },
          { min: 0, max: 1200, tickInterval: 300, startOnTick: false, endOnTick: false, gridLineColor: 'transparent', title: { text: null }, opposite: true, labels: { format: '{value}  W/m²', style: { color: '#aaa' } } }
        ],
        xAxis: { gridLineColor: '#e8e6df', lineColor: '#e8e6df', tickColor: '#e8e6df', labels: { style: { color: '#aaa' } } },
        plotOptions: {
          series: {
            lineWidth: 1.4,
            marker: { enabled: false },
            states: { hover: { lineWidth: 1.8 } },
            legendSymbol: 'rectangle'
          }
        },
        series: [
          { name: 'Batt Volt', data: S.battV, yAxis: 2, tooltip: { valueDecimals: 1, valueSuffix: ' V' }, color: '#ea580c' },
          { name: 'PV', data: S.pv, yAxis: 1, tooltip: { valueDecimals: 1, valueSuffix: ' kW' }, color: '#f59e0b' },
          { name: 'AC Input', data: S.gen, yAxis: 1, tooltip: { valueDecimals: 1, valueSuffix: ' kW' }, color: '#3b82f6' },
          { name: 'Load', data: S.ld, yAxis: 1, tooltip: { valueDecimals: 1, valueSuffix: ' kW' }, color: '#1a1a1a' },
          { name: 'Wind Turbine', data: S.wt, yAxis: 1, tooltip: { valueDecimals: 1, valueSuffix: ' kW' }, color: '#06b6d4' },
          { name: 'Irradiance', data: S.irr, yAxis: 3, tooltip: { valueDecimals: 1, valueSuffix: ' W/m²' }, color: '#ef4444' },
          { name: 'SOC', data: S.soc, yAxis: 0, tooltip: { valueDecimals: 1, valueSuffix: ' %' }, color: '#8b5cf6' }
        ]
      };
      Highcharts.setOptions({ lang: { rangeSelectorZoom: '' } });

      if (window.Highcharts && Highcharts.LegendSymbolMixin) {
        if (Highcharts.seriesTypes.line) Highcharts.seriesTypes.line.prototype.drawLegendSymbol = Highcharts.LegendSymbolMixin.drawRectangle;
        if (Highcharts.seriesTypes.spline) Highcharts.seriesTypes.spline.prototype.drawLegendSymbol = Highcharts.LegendSymbolMixin.drawRectangle;
      }

      chart = new Highcharts.StockChart(opt);
    }

    (function () {
      var d = new Date(), iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      var dp = document.getElementById('dp');
      dp.value = iso;
      dp.addEventListener('change', function () { if (dp.value) render(dp.value); });
      render(iso);
    })();
  </script>
</body>

</html>
