<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Energy Report — Department of Water Resource</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #f5f5f0;
        overflow: hidden;
      }
      .container {
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      iframe {
        width: 100%;
        border: 0;
        display: block;
        background: #f5f5f0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <script>
        // Under ?sim=1 load simulated .html charts (no PHP/DB); else real .php (production).
        (function () {
          var sim = /[?&]sim=1\b/.test(location.search);
          // var mo = sim ? 'graph/monthly.html?sim=1' : 'graph/monthly.php';
          // var yr = sim ? 'graph/yearly.html?sim=1'  : 'graph/yearly.php';

          var mo = "graph/monthly.html";
          var yr = "graph/yearly.html";

          document.write(
            '<iframe name="IF_m"  src="' +
              mo +
              '" style="height:560px" scrolling="no"></iframe>' +
              '<iframe name="IF_m2" src="' +
              yr +
              '" style="height:560px" scrolling="no"></iframe>',
          );
        })();
      </script>
    </div>

</html>
