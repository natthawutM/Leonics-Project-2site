<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Graph — Department of Water Resource</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      background: #f5f5f0;
      overflow: hidden
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f5f5f0
    }
  </style>
</head>

<body>
  <script>
    // Under ?sim=1 load the simulated .html graph (renders without PHP/DB);
    // otherwise load the real DB-backed .php graph (production / WAMP).
    (function () {
      var sim = /[?&]sim=1\b/.test(location.search);
      // var src = sim ? 'graph/3day.html?sim=1' : 'graph/3day.php';
      var src = 'graph/3day.html?sim=1';
      document.write('<iframe name="IF_m" src="' + src + '" scrolling="auto"></iframe>');
    })();
  </script>
</body>

</html>
