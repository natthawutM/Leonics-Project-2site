<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leonics MOC - Fleet Overview</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f0;
      --card: #fff;
      --panel: #fafaf7;
      --border: #e8e6df;
      --text: #1a1a1a;
      --sub: #888;
      --hint: #aaa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --radius: 12px;
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh
    }

    .header {
      background: #1a1a1a;
      color: #f5f5f0;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500
    }

    .header .nav {
      display: flex;
      gap: 4px
    }

    .header .nav a {
      color: #999;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all .12s
    }

    .header .nav a:hover {
      color: #fff;
      background: rgba(255, 255, 255, .08)
    }

    .header .nav a.active {
      color: #fff;
      background: rgba(255, 255, 255, .15)
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .subtitle {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 20px
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .site-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      text-decoration: none;
      color: inherit;
      display: block
    }

    .site-card:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      border-color: #ccc
    }

    /* 
    .site-card.offline {
      opacity: .55
    } */

    .sc-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px
    }

    .sc-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 500
    }

    .sc-badge-offgrid {
      background: rgba(245, 158, 11, .1);
      color: var(--warning)
    }

    .sc-type {
      font-size: 11px;
      color: var(--sub)
    }

    .sc-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px
    }

    .sc-loc {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 12px
    }

    .sc-kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px
    }

    .sc-kpi {
      background: var(--panel);
      border-radius: 6px;
      padding: 7px 9px
    }

    .sc-kpi .lbl {
      font-size: 10px;
      font-weight: 500;
      color: var(--hint);
      text-transform: uppercase;
      letter-spacing: .3px
    }

    .sc-kpi .val {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      margin-top: 1px
    }

    .sc-kpi .val .u {
      font-size: 10px;
      color: var(--sub);
      margin-left: 1px
    }

    .sc-kpi .val.is-dim {
      opacity: .5
    }

    .sc-status {
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .sc-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500
    }

    .sc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%
    }

    .sc-dot-ok {
      background: var(--success)
    }

    .sc-dot-stale {
      background: var(--warning)
    }

    .sc-dot-err {
      background: var(--danger)
    }

    .sc-time {
      font-size: 11px;
      color: var(--hint);
      font-family: var(--mono)
    }

    @media(max-width:700px) {
      .grid {
        grid-template-columns: 1fr
      }

      .sc-kpis {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    @media(max-width:480px) {
      .page {
        padding: 16px 12px
      }

      .header {
        padding: 0 12px
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="brand">Leonics MOC</div>
    <div class="nav">
      <a href="fleet.html" class="active">My sites</a>
      <a href="compare.html">Compare</a>
    </div>
  </div>

  <div class="page">
    <h1>My sites</h1>
    <div class="subtitle">2 sites - BELB Off-Grid Hybrid - Sabah, Malaysia</div>
    <div class="grid" id="fleet"></div>
  </div>

  <script>
    const SITES = [
      // Server path
      // { id: 1, name: 'Tetabuan', loc: 'Sabah, Malaysia', path: 'http://www.leonics-moc.com:52080/BELB_Sabah/Tetabuan_MYS/f1/', menuPath: 'menu.html', proxyType: 'Tetabuan' },
      // { id: 2, name: 'Terusan', loc: 'Sabah, Malaysia', path: 'http://www.leonics-moc.com:52080/BELB_Sabah/Terusan_MYS/f1/', menuPath: 'menu.html', proxyType: 'Terusan' },

      // Local path
      { id: 1, name: 'Tetabuan', loc: 'Sabah, Malaysia', path: 'Tetabuan_MYS/f1/', menuPath: 'menu.html', proxyType: 'Tetabuan' },
      { id: 2, name: 'Terusan', loc: 'Sabah, Malaysia', path: 'Terusan_MYS/f1/', menuPath: 'menu.html', proxyType: 'Terusan' },
    ];

    const LIVE_OK_SECONDS = 10;
    const LIVE_STALE_SECONDS = 120;
    const siteTimestampState = {};

    function num(xml, tag) {
      const el = xml.querySelector(tag);
      if (!el) return null;
      const t = el.textContent.trim();
      if (t === '' || t === 'err' || t === 'Err' || isNaN(parseFloat(t))) return null;
      return parseFloat(t);
    }

    function fmt(v, d = 1) {
      return v === null ? '-' : Number(v).toFixed(d);
    }

    function parseXmlDateTime(dateText, timeText) {
      const m = /^(\d{2})-([A-Za-z]{3})-(\d{2}|\d{4})$/.exec((dateText || '').trim());
      const t = /^(\d{2}):(\d{2}):(\d{2})$/.exec((timeText || '').trim());
      if (!m || !t) return null;

      const months = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
      const month = months[m[2].toLowerCase()];
      if (month === undefined) return null;

      let year = Number(m[3]);
      if (m[3].length === 2) year += year >= 70 ? 1900 : 2000;

      return new Date(year, month, Number(m[1]), Number(t[1]), Number(t[2]), Number(t[3]));
    }

    function buildMainXmlUrl(site) {
      return `${site.path}Xml/Main.xml?_=${Date.now()}`;
    }

    function sumNums(xml, tags) {
      let total = 0;
      let found = false;
      tags.forEach(tag => {
        const value = num(xml, tag);
        if (value !== null) {
          total += value;
          found = true;
        }
      });
      return found ? total : null;
    }

    function firstNum(xml, tags) {
      for (const tag of tags) {
        const value = num(xml, tag);
        if (value !== null) return value;
      }
      return null;
    }

    function hasXmlError(xml) {
      const err = xml && xml.querySelector('error');
      return !!(err && err.textContent.trim());
    }

    function getLiveState(site, metrics) {
      if (!metrics || !metrics.timestampKey || !metrics.serverDateObj || Number.isNaN(metrics.serverDateObj.getTime())) {
        return { status: 'offline', label: 'Offline', dotClass: 'sc-dot-err' };
      }

      const state = siteTimestampState[site.proxyType] || { lastKey: null, changedAt: 0 };
      if (metrics.timestampKey !== state.lastKey) {
        state.lastKey = metrics.timestampKey;
        state.changedAt = Date.now();
      } else if (!state.changedAt) {
        state.changedAt = Date.now();
      }
      siteTimestampState[site.proxyType] = state;

      const ageSec = Math.abs((Date.now() - metrics.serverDateObj.getTime()) / 1000);
      const frozenSec = state.changedAt ? ((Date.now() - state.changedAt) / 1000) : 0;

      if (ageSec <= LIVE_OK_SECONDS && frozenSec <= LIVE_OK_SECONDS) {
        return { status: 'online', label: 'Online', dotClass: 'sc-dot-ok' };
      }
      if (ageSec <= LIVE_STALE_SECONDS && frozenSec <= LIVE_STALE_SECONDS) {
        return { status: 'stale', label: 'Stale', dotClass: 'sc-dot-stale' };
      }
      return { status: 'offline', label: 'Offline', dotClass: 'sc-dot-err' };
    }

    function extractSiteMetrics(xml) {
      if (!xml || hasXmlError(xml)) return null;

      const solar = sumNums(xml, ['GCI1_Sum_PV_kW', 'GCI2_Sum_PV_kW', 'GCI3_Sum_PV_kW', 'GCI4_Sum_PV_kW', 'SCC1_PV_Power_kW', 'SCC2_PV_Power_kW'])
        ?? firstNum(xml, ['PV_kW'])
        ?? sumNums(xml, ['SCC1_PV_Power_kW', 'SCC2_PV_Power_kW', 'SCC3_PV_Power_kW', 'SCC4_PV_Power_kW'])
        ?? sumNums(xml, ['GCI1_Sum_PV_kW', 'GCI2_Sum_PV_kW', 'GCI3_Sum_PV_kW', 'GCI4_Sum_PV_kW']);

      const gen = sumNums(xml, ['Gen1_Total_Power_kW', 'Gen2_Total_Power_kW'])
        ?? firstNum(xml, ['ACin_PM_Total_P_kW', 'Ctrl_PM_Total_P_kW']);

      const load = firstNum(xml, ['Load_PM_Total_P_kW'])
        ?? sumNums(xml, ['BDI1_Load_Total_Power_kW', 'BDI2_Load_Total_Power_kW']);

      const battery = sumNums(xml, ['BDI1_BDI_DC_Power_kW', 'BDI2_BDI_DC_Power_kW'])
        ?? firstNum(xml, ['BDI_BDI_DC_Power_kW'])
        ?? sumNums(xml, ['BDI1_BDI_Total_Power_kW', 'BDI2_BDI_Total_Power_kW']);

      let soc = num(xml, 'BDI_BDI_SOC');
      if (soc === null) {
        const socValues = ['BDI1_BDI_SOC', 'BDI2_BDI_SOC']
          .map(tag => num(xml, tag))
          .filter(v => v !== null);
        soc = socValues.length ? socValues.reduce((a, b) => a + b, 0) / socValues.length : null;
      }

      const ds = xml.querySelector('DateServer');
      const ts = xml.querySelector('TimeServer');
      const dateServer = ds ? ds.textContent.trim() : '';
      const timeServer = ts ? ts.textContent.trim() : '';
      return {
        solar,
        gen,
        load,
        battery,
        soc,
        dateServer,
        timeServer,
        timestampKey: dateServer && timeServer ? (dateServer + ' ' + timeServer) : '',
        serverDateObj: parseXmlDateTime(dateServer, timeServer)
      };
    }

    function buildCard(site, data) {
      const metrics = extractSiteMetrics(data);
      const liveState = getLiveState(site, metrics);
      const hasMetrics = metrics !== null;
      const isDim = liveState.status === 'offline';
      const solar = hasMetrics ? metrics.solar : null;
      const gen = hasMetrics ? metrics.gen : null;
      const load = hasMetrics ? metrics.load : null;
      const battery = hasMetrics ? metrics.battery : null;
      const timeStr = hasMetrics && metrics.timestampKey ? metrics.timestampKey : '-';

      return `<a class="site-card ${hasMetrics ? '' : 'offline'}" href="${site.path}${site.menuPath}" target="_top">
    <div class="sc-top">
      <span class="sc-badge sc-badge-offgrid">Off-Grid</span>
      <span class="sc-type">Solar+Bat+Gen</span>
    </div>
    <div class="sc-name">${site.name}</div>
    <div class="sc-loc">${site.loc}</div>
    <div class="sc-kpis">
      <div class="sc-kpi"><div class="lbl">Solar</div><div class="val ${isDim ? 'is-dim' : ''}" style="color:${solar > 0.5 ? '#f59e0b' : ''}">${fmt(solar)}<span class="u">kW</span></div></div>
      <div class="sc-kpi"><div class="lbl">Generators</div><div class="val ${isDim ? 'is-dim' : ''}" style="color:${gen !== null ? '#3b82f6' : ''}">${fmt(gen)}<span class="u">kW</span></div></div>
      <div class="sc-kpi"><div class="lbl">Load</div><div class="val ${isDim ? 'is-dim' : ''}" style="color:${load !== null ? '#1a1a1a' : ''}">${fmt(load)}<span class="u">kW</span></div></div>
      <div class="sc-kpi"><div class="lbl">Battery</div><div class="val ${isDim ? 'is-dim' : ''}" style="color:${battery !== null ? '#8b5cf6' : ''}">${fmt(battery)}<span class="u">kW</span></div></div>
    </div>
    <div class="sc-status">
      <div class="sc-pill"><span class="sc-dot ${liveState.dotClass}"></span>${liveState.label}</div>
      <div class="sc-time">${timeStr}</div>
    </div>
  </a>`;
    }

    async function fetchSite(site) {
      try {
        const res = await fetch(buildMainXmlUrl(site), { cache: 'no-store' });
        if (!res.ok) return null;
        const text = await res.text();
        const xml = new DOMParser().parseFromString(text, 'text/xml');
        return hasXmlError(xml) ? null : xml;
      } catch (e) {
        return null;
      }
    }

    async function refresh() {
      const results = await Promise.all(SITES.map(s => fetchSite(s)));
      let html = '';
      SITES.forEach((site, i) => {
        html += buildCard(site, results[i]);
      });
      document.getElementById('fleet').innerHTML = html;
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>

</html>
