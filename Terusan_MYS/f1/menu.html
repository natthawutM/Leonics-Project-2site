  <title>Terusan - Leonics MOC</title>
  <script>
    if (window.history && window.history.replaceState) {
      var basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
      if (!document.querySelector('base')) {
        var base = document.createElement('base');
        base.href = basePath;
        document.head.appendChild(base);
      }
      window.history.replaceState({}, document.title, '/#');
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-main: #f5f5f0;
      --bg-card: #ffffff;
      --bg-panel: #fafaf7;
      --bg-dark: #1a1a1a;
      --border-default: #e8e6df;
      --border-hover: #ccc;
      --text-primary: #1a1a1a;
      --text-secondary: #888;
      --text-tertiary: #aaa;
      --text-on-dark: #f5f5f0;
      --success: #22c55e;
      --info: #3b82f6;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, monospace;

      --header-h: 48px;
      --nav-h: 44px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    .mono {
      font-family: var(--font-mono);
      font-feature-settings: "tnum" 1
    }

    /* ---------- TOP HEADER ---------- */
    .app-header {
      height: var(--header-h);
      background: var(--bg-dark);
      color: var(--text-on-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-logo {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--bg-card);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block
    }

    .brand-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px
    }

    .brand-text .sub {
      color: #888;
      font-weight: 400;
      margin-left: 6px
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .live-stamp {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #bbb;
    }

    .live-stamp .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .live-stamp.is-stale .live-dot {
      background: #f59e0b;
      animation: none
    }

    .live-stamp.is-stale .label,
    .live-stamp.is-stale .ts {
      color: #f59e0b
    }

    .live-stamp.is-offline .live-dot {
      background: #ef4444;
      animation: none
    }

    .live-stamp.is-offline .label,
    .live-stamp.is-offline .ts {
      color: #ef4444
    }

    .live-stamp .ts {
      font-family: var(--font-mono);
      color: #f5f5f0
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.7)
      }
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.08);
      color: #f5f5f0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      transition: background .15s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.16)
    }

    .logout-btn svg {
      width: 14px;
      height: 14px
    }

    /* ---------- SITE BAR ---------- */
    .site-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .site-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .back-link:hover {
      color: var(--text-primary)
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.10);
      color: var(--info);
      font-size: 11px;
      font-weight: 500;
    }

    .site-name {

      font-weight: 600;
      color: var(--text-primary)
    }

    .site-loc {
      font-size: 12px;
      color: var(--text-secondary)
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.10);
      color: var(--success);
      font-size: 11px;
      font-weight: 500;
    }

    .status-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success)
    }

    .status-pill.is-stale {

      color: #f59e0b
    }

    .status-pill.is-stale .dot {

    }

    .status-pill.is-offline {
      background: rgba(239, 68, 68, 0.10);
      color: #ef4444
    }

    .status-pill.is-offline .dot {
      background: #ef4444
    }

    /* ---------- NAV TABS ---------- */
    .nav-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      height: var(--nav-h);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .nav-bar::-webkit-scrollbar {
      display: none

    .nav-btn {

      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;

      color: var(--text-primary)
    }

    .nav-btn.active {
      background: var(--bg-dark);
      color: #fff
    }

    .nav-btn .ico {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn .ico svg {

    /* ---------- MAIN IFRAME ---------- */
    .app-main {
      position: absolute;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .app-main>.site-bar {
      flex: 0 0 auto
    }

    .app-main>.nav-bar {
      flex: 0 0 auto
    }

    .frame-wrap {
      flex: 1 1 auto;
      background: var(--bg-main);
      overflow: hidden;
      min-height: 0;
    }

    .frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg-main);
    }

    @media (max-width: 420px) {

      }

        font-size: 11px
      }
    }
  </style>

  <script>
    // Active state for nav tabs (click highlight)
    (function () {
      const buttons = document.querySelectorAll('.nav-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function () {
          buttons.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
        });
      });
    })();

    // Live timestamp from Main.xml — updates every 2s
    const LIVE_OK_SECONDS = 10;
    const LIVE_STALE_SECONDS = 120;
    let lastTimestampKey = null;
    let lastTimestampChangedAt = 0;

    function parseXmlDateTime(dateText, timeText) {
      const m = /^(\d{2})-([A-Za-z]{3})-(\d{2}|\d{4})$/.exec((dateText || '').trim());
      const t = /^(\d{2}):(\d{2}):(\d{2})$/.exec((timeText || '').trim());
      if (!m || !t) return null;

      const months = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
      const month = months[m[2].toLowerCase()];
      if (month === undefined) return null;

      let year = Number(m[3]);
      if (m[3].length === 2) year += year >= 70 ? 1900 : 2000;

      return new Date(year, month, Number(m[1]), Number(t[1]), Number(t[2]), Number(t[3]));
    }

    function applyLiveState(serverDate) {
      const liveStamp = document.getElementById('live-stamp');
      const liveLabel = document.getElementById('live-label');
      const siteStatus = document.getElementById('site-status');
      const siteStatusText = document.getElementById('site-status-text');
      if (!liveStamp || !liveLabel || !siteStatus || !siteStatusText || !serverDate || Number.isNaN(serverDate.getTime())) return;

      const ageSec = Math.abs((Date.now() - serverDate.getTime()) / 1000);
      const frozenSec = lastTimestampChangedAt ? ((Date.now() - lastTimestampChangedAt) / 1000) : 0;
      liveStamp.classList.remove('is-stale', 'is-offline');
      siteStatus.classList.remove('is-stale', 'is-offline');

      if (ageSec <= LIVE_OK_SECONDS && frozenSec <= LIVE_OK_SECONDS) {
        liveLabel.textContent = 'Live';
        siteStatusText.textContent = 'online';
      } else if (ageSec <= LIVE_STALE_SECONDS && frozenSec <= LIVE_STALE_SECONDS) {
        liveLabel.textContent = 'Stale';
        siteStatusText.textContent = 'stale';
        liveStamp.classList.add('is-stale');
        siteStatus.classList.add('is-stale');
      } else {
        liveLabel.textContent = 'Offline';
        siteStatusText.textContent = 'offline';
        liveStamp.classList.add('is-offline');
        siteStatus.classList.add('is-offline');
      }
    }

    async function updateTimestamp() {
      try {
        const res = await fetch('Xml/Main.xml?_=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) {
          applyLiveState(new Date(0));
          return;
        }
        const text = await res.text();
        const xml = new DOMParser().parseFromString(text, 'text/xml');
        const ds = xml.querySelector('DateServer');
        const ts = xml.querySelector('TimeServer');
        const el = document.getElementById('menu-ts');
        if (el && ds && ts) {
          const dateText = ds.textContent.trim();
          const timeText = ts.textContent.trim();
          const timestampKey = dateText + ' ' + timeText;
          if (timestampKey !== lastTimestampKey) {
            lastTimestampKey = timestampKey;
            lastTimestampChangedAt = Date.now();
          } else if (!lastTimestampChangedAt) {
            lastTimestampChangedAt = Date.now();
          }
          el.textContent = dateText + ' ' + timeText;
          applyLiveState(parseXmlDateTime(dateText, timeText));
        }
      } catch (e) {
        applyLiveState(new Date(0));
      }
    }
    updateTimestamp();
    setInterval(updateTimestamp, 2000);
  </script>
