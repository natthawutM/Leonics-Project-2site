<!doctype html>
<html lang="en">
  <head>
    <script>
      if (window.history && window.history.replaceState) {
        let basePath = window.location.pathname.substring(
          0,
          window.location.pathname.lastIndexOf("/") + 1,
        );
        if (!document.querySelector("base")) {
          let base = document.createElement("base");
          base.href = basePath;
          document.head.appendChild(base);
        }
        window.history.replaceState({}, document.title, "/#");
      }
    </script>

    <script>
      if (window.history && window.history.replaceState) {
        var base = document.createElement("base");
        base.href = window.location.href.split("#")[0];
        document.head.appendChild(base);
        window.history.replaceState({}, document.title, "/#");
      }
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GCI — Department of Water Resource</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f5f5f0;
        --bg-card: #fff;
        --bg-panel: #fafaf7;
        --border-default: #e8e6df;
        --text-primary: #1a1a1a;
        --text-secondary: #888;
        --text-tertiary: #aaa;
        --warning: #f59e0b;
        --radius-sm: 6px;
        --radius-lg: 12px;
        --font-sans: "DM Sans", system-ui, sans-serif;
        --font-mono: "DM Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg-main);
        color: var(--text-primary);
        font-size: 13px;
        line-height: 1.5;
        padding: 16px;
        min-height: 100vh;
      }

      .mono {
        font-family: var(--font-mono);
        font-feature-settings: "tnum" 1;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-lg);
        padding: 16px;
        margin-bottom: 12px;
      }

      .card-title {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-title .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .kpi-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }

      .kpi-box {
        background: var(--bg-panel);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
      }

      .kpi-box .lbl {
        font-size: 10px;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .kpi-box .val {
        font-family: var(--font-mono);
        font-size: 16px;
        font-weight: 600;
        margin-top: 2px;
      }

      .kpi-box .val .u {
        font-size: 11px;
        color: var(--text-secondary);
        margin-left: 2px;
      }

      .phase-table {
        width: 100%;
        border-collapse: collapse;
      }

      .phase-table th {
        font-size: 10px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.3px;
        text-align: right;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border-default);
      }

      .phase-table th:first-child {
        text-align: left;
      }

      .phase-table td {
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 8px;
        text-align: right;
        border-bottom: 1px solid var(--border-default);
      }

      .phase-table td:first-child {
        font-family: var(--font-sans);
        text-align: left;
        font-weight: 500;
        font-size: 12px;
      }

      .phase-table tr:last-child td {
        border-bottom: none;
      }

      .phase-chip {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 2px;
        margin-right: 6px;
        vertical-align: middle;
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        padding: 10px 0 6px;
        border-bottom: 1px solid var(--border-default);
        margin: 12px 0 8px;
      }

      .energy-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .energy-box {
        background: var(--bg-panel);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .energy-box .lbl {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .energy-box .val {
        font-family: var(--font-mono);
        font-size: 14px;
        font-weight: 600;
      }

      .energy-box .val .u {
        font-size: 11px;
        color: var(--text-secondary);
        margin-left: 2px;
      }

      .stamp {
        font-size: 11px;
        color: var(--text-tertiary);
        display: flex;
        justify-content: space-between;
        padding: 4px;
        margin-top: 4px;
      }

      .stamp .live {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #22c55e;
        font-weight: 500;
      }

      .stamp .live::before {
        content: "";
        width: 6px;
        height: 6px;
        background: #22c55e;
        border-radius: 50%;
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.4;
        }
      }

      @media (max-width: 768px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }

        .kpi-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .energy-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      if (/[?&]sim=1\b/.test(location.search))
        document.write('<script src="sim.js?_=' + Date.now() + '"><\/script>');
    </script>
  </head>

  <body>
    <div class="page">
      <div id="gci-summary"></div>
      <div class="grid-2" id="gci-grid"></div>
      <div id="status-stamp" class="stamp" style="grid-column: 1 / -1">
        <span id="live-indicator" class="live">Live Monitoring - GCI</span>
        <span
          >Last update:
          <span id="last-update" class="mono" style="color: #1a1a1a"
            >—</span
          ></span
        >
      </div>
    </div>
    <script>
      const XML_URL = "Xml/Main.xml",
        POLL_MS = 2000,
        $ = (id) => document.getElementById(id);
      function num(xml, tag, d = 2) {
        const el = xml.querySelector(tag);
        if (!el) return null;
        const t = el.textContent.trim();
        if (
          t === "" ||
          t.toLowerCase() === "err" ||
          t === "ErrTime" ||
          isNaN(parseFloat(t))
        )
          return null;
        return Number(parseFloat(t).toFixed(d));
      }
      function fmt(v, d = 2) {
        return v === null || v === undefined ? "—" : Number(v).toFixed(d);
      }

      function buildSummary(xml) {
        const v = (tag, d = 2) => fmt(num(xml, tag, d), d);
        return `<div class="card">
    <div class="card-title"><span class="dot" style="background:#f59e0b"></span>Grid Connected Inverters — Combined</div>
    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:0">
      <div class="kpi-box"><div class="lbl">Total PV (DC)</div><div class="val mono">${v("GCI_Sum_PV_kW")}<span class="u">kW</span></div></div>
      <div class="kpi-box"><div class="lbl">Total AC out</div><div class="val mono" style="color:#f59e0b">${v("GCI_Sum_AC_kW")}<span class="u">kW</span></div></div>
      <div class="kpi-box"><div class="lbl">Today AC energy</div><div class="val mono">${v("GCI_Sum_Today_AC_kWh")}<span class="u">kWh</span></div></div>
      <div class="kpi-box"><div class="lbl">Today PV energy</div><div class="val mono">${v("GCI_Sum_Today_PV_kWh")}<span class="u">kWh</span></div></div>
    </div>
  </div>`;
      }

      function buildGciCard(xml, n) {
        const p = "GCI" + n + "_";
        const v = (tag, d = 2) => fmt(num(xml, p + tag, d), d);
        let pv = "";
        for (let s = 1; s <= 4; s++) {
          pv += `<tr><td><span class="phase-chip" style="background:#f59e0b"></span>String ${s}</td><td>${v("PV" + s + "_Voltage", 1)}</td><td>${v("PV" + s + "_Current")}</td><td>${v("PV" + s + "_Power_kW")}</td></tr>`;
        }
        const chips = ["#ef4444", "#f59e0b", "#3b82f6"];
        let ac = "";
        for (let i = 1; i <= 3; i++) {
          ac += `<tr><td><span class="phase-chip" style="background:${chips[i - 1]}"></span>L${i}</td><td>${v("AC_Voltage_L" + i, 1)}</td><td>${v("AC_Current_I" + i, 1)}</td><td>${v("AC_Freq_L" + i + "_Hz", 2)}</td></tr>`;
        }
        return `<div class="card">
    <div class="card-title"><span class="dot" style="background:#f59e0b"></span>Grid Connected Inverter No.${n}</div>
    <div class="kpi-row">
      <div class="kpi-box"><div class="lbl">Total PV power</div><div class="val mono">${v("Sum_PV_kW")}<span class="u">kW</span></div></div>
      <div class="kpi-box"><div class="lbl">AC power</div><div class="val mono" style="color:#f59e0b">${v("AC_Power_kW")}<span class="u">kW</span></div></div>
      <div class="kpi-box"><div class="lbl">Today PV</div><div class="val mono">${v("Today_PV_kWh")}<span class="u">kWh</span></div></div>
    </div>
    <div class="section-label">PV strings (DC)</div>
    <table class="phase-table">
      <thead><tr><th></th><th>V</th><th>A</th><th>kW</th></tr></thead>
      <tbody>${pv}</tbody>
    </table>
    <div class="section-label">AC output</div>
    <table class="phase-table">
      <thead><tr><th></th><th>V</th><th>A</th><th>Hz</th></tr></thead>
      <tbody>${ac}</tbody>
    </table>
    <div class="section-label">Energy</div>
    <div class="energy-row">
      <div class="energy-box"><span class="lbl">Today PV</span><span class="val mono">${v("Today_PV_kWh")}<span class="u">kWh</span></span></div>
      <div class="energy-box"><span class="lbl">Todate PV</span><span class="val mono">${v("Todate_PV_kWh")}<span class="u">kWh</span></span></div>
    </div>
  </div>`;
      }

      async function fetchAndRender() {
        try {
          const res = await fetch(XML_URL + "?_=" + Date.now(), {
            cache: "no-store",
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const xml = new DOMParser().parseFromString(
            await res.text(),
            "text/xml",
          );
          $("gci-summary").innerHTML = buildSummary(xml);
          $("gci-grid").innerHTML = buildGciCard(xml, 1) + buildGciCard(xml, 2);
          const now = new Date(),
            pad = (n) => String(n).padStart(2, "0");

          // ---- Timestamps ----
          const dsEl = xml.querySelector("DateServer");
          const tsEl = xml.querySelector("TimeServer");
          const ds = dsEl ? dsEl.textContent.trim() : null;
          const ts = tsEl ? tsEl.textContent.trim() : null;

          const scuStr = ds && ts ? ds + " " + ts : "—";
          const xmlTime = new Date(scuStr).getTime();
          const nowMs = Date.now();
          const isOffline = isNaN(xmlTime) || nowMs - xmlTime > 15 * 60 * 1000;

          const liveInd = $("live-indicator");
          const statusStamp = $("status-stamp");

          if (liveInd && statusStamp) {
            if (isOffline) {
              statusStamp.className = "stamp is-offline";
              liveInd.className = "offline";
              liveInd.innerHTML =
                '<span style="display:inline-block;width:6px;height:6px;background:#ef4444;border-radius:50%;margin-right:6px"></span>Offline Monitoring - GCI';
              liveInd.style.color = "#ef4444";
              liveInd.style.display = "inline-flex";
              liveInd.style.alignItems = "center";
              liveInd.style.fontWeight = "500";
            } else {
              statusStamp.className = "stamp is-live";
              liveInd.className = "live";
              liveInd.textContent = "Live Monitoring - GCI";
              liveInd.style.color = "";
              liveInd.style.display = "";
              liveInd.style.alignItems = "";
              liveInd.style.fontWeight = "";
            }
          }

          if ($("last-update")) {
            $("last-update").textContent = ts ? ts : "—";
            $("last-update").style.color = isOffline ? "#ef4444" : "#1a1a1a";
          }
        } catch (e) {
          console.error("GCI fetch error:", e);
        }
      }
      fetchAndRender();
      setInterval(fetchAndRender, POLL_MS);
    </script>
  </body>
</html>
