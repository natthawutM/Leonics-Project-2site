  <style>
    /* ============================================================
   Solar Monitor Design System — menu.html (app shell)
   Located at: f1/menu.html  ·  All paths are relative to f1/
   Department of Water Resource — Ratchaburi, Thailand
   ============================================================ */
    :root {
      --bg-main: #f5f5f0;
      --bg-card: #ffffff;
      --bg-panel: #fafaf7;
      --bg-dark: #1a1a1a;
      --border-default: #e8e6df;
      --border-hover: #ccc;
      --text-primary: #1a1a1a;
      --text-secondary: #888;
      --text-tertiary: #aaa;
      --text-on-dark: #f5f5f0;
      --success: #22c55e;
      --info: #3b82f6;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, monospace;

      --header-h: 48px;
      --nav-h: 44px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    .mono {
      font-family: var(--font-mono);
      font-feature-settings: "tnum" 1
    }

    /* ---------- TOP HEADER (dark bar) ---------- */
    .app-header {
      height: var(--header-h);
      background: var(--bg-dark);
      color: var(--text-on-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-logo {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--bg-card);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block
    }

    .brand-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px
    }

    .brand-text .sub {
      color: #888;
      font-weight: 400;
      margin-left: 6px
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .live-stamp {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #bbb;
    }

    .live-stamp .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .live-stamp .ts {
      font-family: var(--font-mono);
      color: #f5f5f0
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.7)
      }
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.08);
      color: #f5f5f0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      transition: background .15s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.16)
    }

    .logout-btn svg {
      width: 14px;
      height: 14px
    }

    /* ---------- SITE BAR ---------- */
    .site-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #3b82f6;
    }

    .sep {
      color: #ccc;
      font-size: 12px;
    }

    .site-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.10);
      color: var(--info);
      font-size: 11px;
      font-weight: 500;
    }

    .site-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary)
    }

    .site-loc {
      font-size: 12px;
      color: var(--text-secondary)
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.10);
      color: var(--success);
      font-size: 11px;
      font-weight: 500;
    }

    .status-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success)
    }

    .site-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .client-logos {
      display: inline-flex;
      align-items: center;
      gap: 6px
    }

    .client-logos img {
      height: 28px;
      width: auto;
      display: block;
      object-fit: contain;
      background: #fff;
      padding: 2px 4px;
      border-radius: 6px;
      border: 1px solid var(--border-default)
    }

    @media(max-width:600px) {
      .client-logos img {
        height: 22px;
        padding: 1px 3px
      }
    }

    @media(max-width:420px) {
      .client-logos img {
        height: 18px
      }
    }

    /* ---------- NAV TABS ---------- */
    .nav-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      height: var(--nav-h);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .nav-bar::-webkit-scrollbar {
      display: none
    }

    .nav-btn {
      appearance: none;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-btn:hover {
      background: var(--bg-panel);
      color: var(--text-primary)

    .nav-btn.active {
      background: var(--bg-dark);
      color: #fff
    }

    .nav-btn .ico {

      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn .ico svg {
      width: 100%;
      height: 100%
    }

    /* ---------- MAIN IFRAME ---------- */
    .app-main {
      position: absolute;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .app-main>.site-bar {
      flex: 0 0 auto
    }

    .app-main>.nav-bar {
      flex: 0 0 auto
    }

    .frame-wrap {
      flex: 1 1 auto;
      background: var(--bg-main);
      overflow: hidden;
      min-height: 0;
    }

    .frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg-main);
    }

        gap: 2px

      }

      }

        --nav-h: 40px

      }

        height: 12px
      }

      .logout-btn {

      }

      .logout-btn svg {

        height: 13px
      }
    }

    @media (max-width: 420px) {

      }

        font-size: 11px
      }

      window.history.replaceState({}, document.title, "/#");

  <script>
    // Sim mode propagation: only when ?sim=1 is explicitly set in the URL.
    // Production default = no sim — iframe + nav links use the real .php endpoints.
    (function () {
      if (!/[?&]sim=1\b/.test(location.search)) return;
      const withSim = (u) => u + (u.indexOf('?') >= 0 ? '&' : '?') + 'sim=1';
      const fr = document.getElementById('IF_m');
      if (fr) fr.src = withSim(fr.getAttribute('src'));
      document.querySelectorAll('.nav-btn[target="IF_m"]').forEach(a => {
        a.setAttribute('href', withSim(a.getAttribute('href')));
      });
    })();

    // Active state for nav tabs
    (function () {
      const buttons = document.querySelectorAll('.nav-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function () {
          buttons.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
        });
      });
    })();

    // Fetch timestamp from XML (no Spry, no jQuery needed)
    async function updateTimestamp() {
      try {
        // Use Main_test.xml if in sim mode, else Main.xml
        const isSim = /[?&]sim=1\b/.test(location.search);
        const xmlFile = isSim ? 'Xml/Main.xml' : 'Xml/Main.xml';
        const res = await fetch(xmlFile + '?_=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return;
        const text = await res.text();
        const xml = new DOMParser().parseFromString(text, 'text/xml');
        const ds = xml.querySelector('DateServer');
        const ts = xml.querySelector('TimeServer');
        const el = document.getElementById('menu-ts');
        if (el && ds && ts) {
          const dsText = ds.textContent.trim();
          const tsText = ts.textContent.trim();
          const xmlTime = new Date(`${dsText} ${tsText}`).getTime();
          const now = Date.now();

          const isOffline = isNaN(xmlTime) || (now - xmlTime) > 15 * 60 * 1000;
          const liveDot = el.parentElement ? el.parentElement.querySelector('.live-dot') : null;
          const statusPill = document.querySelector('.status-pill');

          if (isOffline) {
            el.textContent = dsText + ' ' + tsText;
            el.style.color = '#ef4444';
            if (liveDot) {
              liveDot.style.background = '#ef4444';
              liveDot.style.animation = 'none';
            }
            if (statusPill) {
              statusPill.innerHTML = '<span class="dot" style="background:#ef4444"></span>offline';
              statusPill.style.color = '#ef4444';
              statusPill.style.background = 'rgba(239,68,68,0.10)';
            }
          } else {
            el.textContent = dsText + ' ' + tsText;
            el.style.color = '';
            if (liveDot) {
              liveDot.style.background = '';
              liveDot.style.animation = '';
            }
            if (statusPill) {
              statusPill.innerHTML = '<span class="dot"></span>online';
              statusPill.style.color = '';
              statusPill.style.background = '';
            }
          }
        }
      } catch (e) { }
    }
    updateTimestamp();
    setInterval(updateTimestamp, 2000);
  </script>

</body>

</html>
